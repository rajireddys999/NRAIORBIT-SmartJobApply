[build]
  base    = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all /api/* calls to Railway backend — keeps auth cookies on same origin
[[redirects]]
  from   = "/api/*"
  to     = "https://backend-production-6a83.up.railway.app/api/:splat"
  status = 200
  force  = true

[context.production.environment]
  NEXT_PUBLIC_API_URL = ""   # empty = use /api proxy

[context.deploy-preview.environment]
  NEXT_PUBLIC_API_URL = ""

[context.branch-deploy.environment]
  NEXT_PUBLIC_API_URL = ""
