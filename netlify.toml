[build]
  base    = "frontend"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to Railway backend — avoids CORS and keeps cookies same-origin
[[redirects]]
  from   = "/api/*"
  to     = "https://backend-production-6a83.up.railway.app/api/:splat"
  status = 200
  force  = true

[context.production.environment]
  NEXT_PUBLIC_API_URL = ""

[context.deploy-preview.environment]
  NEXT_PUBLIC_API_URL = ""

[context.branch-deploy.environment]
  NEXT_PUBLIC_API_URL = ""
