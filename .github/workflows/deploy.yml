name: Deploy — Netlify + Railway

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy frontend → Netlify ────────────────────────────
  deploy-frontend:
    name: Frontend → Netlify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""   # empty = use /api Netlify proxy

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir:       frontend/.next
          production-branch: main
          production-deploy: true
          deploy-message:    "Deploy from GitHub Actions — ${{ github.sha }}"
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

  # ── 2. Deploy backend → Railway ─────────────────────────────
  deploy-backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend service
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN:      ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 13d683de-fb50-40b9-9c5b-14968fd1effb

      - name: Deploy worker service
        run: railway up --service worker --detach
        env:
          RAILWAY_TOKEN:      ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 13d683de-fb50-40b9-9c5b-14968fd1effb

      - name: Deploy beat service
        run: railway up --service beat --detach
        env:
          RAILWAY_TOKEN:      ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 13d683de-fb50-40b9-9c5b-14968fd1effb
