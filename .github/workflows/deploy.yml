name: Deploy — Netlify + Railway

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy frontend → Netlify ────────────────────────────
  deploy-frontend:
    name: Frontend → Netlify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir:       frontend/out
          production-branch: main
          production-deploy: true
          deploy-message:    "Deploy from GitHub Actions — ${{ github.sha }}"
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

  # ── 2. Deploy backend → Railway (GraphQL API) ───────────────
  deploy-backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      ENV_ID: "10b275a6-6214-4409-a1b4-e6dc47d0443f"
    steps:
      - name: Redeploy backend
        run: |
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(environmentId: \\\"$ENV_ID\\\", serviceId: \\\"4c0e1958-bf97-459e-aeaf-0463d4b8879e\\\", latestCommit: true) }\"}")
          echo "backend: $RESP"
          echo "$RESP" | grep -q '"errors"' && echo "::error::Railway API error" && exit 1 || true

      - name: Redeploy worker
        run: |
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(environmentId: \\\"$ENV_ID\\\", serviceId: \\\"edf5cfb7-24c1-42b9-973c-261ad6d75ed7\\\", latestCommit: true) }\"}")
          echo "worker: $RESP"
          echo "$RESP" | grep -q '"errors"' && echo "::error::Railway API error" && exit 1 || true

      - name: Redeploy beat
        run: |
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(environmentId: \\\"$ENV_ID\\\", serviceId: \\\"e0350d43-696d-496e-86b9-6b222238026b\\\", latestCommit: true) }\"}")
          echo "beat: $RESP"
          echo "$RESP" | grep -q '"errors"' && echo "::error::Railway API error" && exit 1 || true
