name: Deploy — Netlify

# Railway auto-deploys via its native GitHub integration.
# Connect each service in Railway dashboard:
#   Service → Settings → Source → Connect Repo → select branch: main
# No token or secret needed here for Railway.

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Frontend → Netlify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir:       frontend/out
          production-branch: main
          production-deploy: true
          deploy-message:    "Deploy from GitHub Actions — ${{ github.sha }}"
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
