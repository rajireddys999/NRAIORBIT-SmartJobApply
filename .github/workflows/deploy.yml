name: Deploy — Netlify + Railway

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy frontend → Netlify ────────────────────────────
  deploy-frontend:
    name: Frontend → Netlify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""   # empty = use /api Netlify proxy

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir:       frontend/out
          production-branch: main
          production-deploy: true
          deploy-message:    "Deploy from GitHub Actions — ${{ github.sha }}"
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

  # ── 2. Deploy backend → Railway (via deploy hooks) ──────────
  # Deploy hooks are set up per-service in Railway:
  # Service → Settings → Deploy → Deploy Hooks → Add hook
  # Add each hook URL as a GitHub secret (no auth token needed).
  deploy-backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend redeploy
        run: curl -sS -X POST "${{ secrets.RAILWAY_BACKEND_HOOK }}"

      - name: Trigger worker redeploy
        run: curl -sS -X POST "${{ secrets.RAILWAY_WORKER_HOOK }}"

      - name: Trigger beat redeploy
        run: curl -sS -X POST "${{ secrets.RAILWAY_BEAT_HOOK }}"
